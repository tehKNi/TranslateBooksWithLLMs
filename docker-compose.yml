services:
  translate-book:
    image: ${TRANSLATEBOOK_IMAGE:-ghcr.io/tehkni/translatebookswithllms:latest}
    build:
      context: .
      args:
        INSTALL_CHATTERBOX: ${INSTALL_CHATTERBOX:-0}
        INSTALL_OMNIVOICE: ${INSTALL_OMNIVOICE:-0}
    ports:
      - "5000:5000"
    environment:
      - API_ENDPOINT=http://localhost:11434/api/generate
      - DEFAULT_MODEL=qwen3:14b
      - LLM_PROVIDER=ollama
      - PORT=5000
      - HOST=0.0.0.0
      - REQUEST_TIMEOUT=900
      - DEFAULT_TARGET_LANGUAGE=
      - DEBUG_MODE=false
    volumes:
      - ./translated_files:/app/translated_files
      - ./logs:/app/logs
